<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 1 - Form Frontend</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 30px; }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 24px; color: #333; }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2 { margin-bottom: 16px; color: #555; font-size: 18px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
    input, select {
      width: 100%; padding: 9px 12px;
      border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
    }
    button {
      padding: 10px 20px; border: none; border-radius: 4px;
      cursor: pointer; font-size: 14px; margin-right: 8px;
    }
    .btn-primary { background: #1677ff; color: #fff; }
    .btn-secondary { background: #6c757d; color: #fff; }
    .btn-danger { background: #dc3545; color: #fff; }
    .btn-primary:hover { background: #0958d9; }
    .btn-secondary:hover { background: #5a6268; }
    #response {
      margin-top: 12px; padding: 12px;
      border-radius: 4px; font-size: 13px;
      white-space: pre-wrap; display: none;
    }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 12px; border: 1px solid #dee2e6; text-align: left; }
    th { background: #f8f9fa; font-weight: bold; }
    tr:nth-child(even) { background: #f8f9fa; }
    .empty-msg { text-align: center; padding: 20px; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Huawei Technical Test - Task 1</h1>

    <!-- Form Input -->
    <div class="card">
      <h2>Input Data Formulir</h2>
      <form id="dataForm">
        <div class="form-group">
          <label>Nama</label>
          <input type="text" id="nama" placeholder="Masukkan nama" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Masukkan email" required />
        </div>
        <div class="form-group">
          <label>Posisi</label>
          <input type="text" id="posisi" placeholder="Masukkan posisi" required />
        </div>
        <div class="form-group">
          <label>Pesan</label>
          <input type="text" id="pesan" placeholder="Masukkan pesan (opsional)" />
        </div>
        <button type="submit" class="btn-primary">Kirim Data</button>
        <button type="button" class="btn-secondary" onclick="loadData()">Refresh Data</button>
      </form>
      <div id="response"></div>
    </div>

    <!-- Data Table -->
    <div class="card">
      <h2>Data Tersimpan</h2>
      <div id="tableContainer">
        <p class="empty-msg">Belum ada data.</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000';

    document.getElementById('dataForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        nama:   document.getElementById('nama').value.trim(),
        email:  document.getElementById('email').value.trim(),
        posisi: document.getElementById('posisi').value.trim(),
        pesan:  document.getElementById('pesan').value.trim(),
      };

      try {
        const res = await fetch(`${API_BASE}/api/form`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const json = await res.json();
        showResponse(res.ok, JSON.stringify(json, null, 2));
        if (res.ok) {
          document.getElementById('dataForm').reset();
          loadData();
        }
      } catch (err) {
        showResponse(false, 'Gagal terhubung ke server: ' + err.message);
      }
    });

    async function loadData() {
      try {
        const res = await fetch(`${API_BASE}/api/data`);
        const json = await res.json();
        renderTable(json.data);
      } catch (err) {
        document.getElementById('tableContainer').innerHTML =
          '<p class="empty-msg" style="color:red">Gagal memuat data: ' + err.message + '</p>';
      }
    }

    async function deleteData(id) {
      if (!confirm(`Hapus data ID ${id}?`)) return;
      try {
        const res = await fetch(`${API_BASE}/api/data/${id}`, { method: 'DELETE' });
        const json = await res.json();
        showResponse(res.ok, JSON.stringify(json, null, 2));
        loadData();
      } catch (err) {
        showResponse(false, 'Gagal menghapus data: ' + err.message);
      }
    }

    function renderTable(data) {
      const container = document.getElementById('tableContainer');
      if (!data || data.length === 0) {
        container.innerHTML = '<p class="empty-msg">Belum ada data.</p>';
        return;
      }
      const headers = Object.keys(data[0]);
      const headerRow = headers.map(h => `<th>${h}</th>`).join('');
      const rows = data.map(row => {
        const cells = headers.map(h =>
          h === 'id'
            ? `<td>${row[h]}</td>`
            : `<td>${row[h] ?? ''}</td>`
        ).join('');
        return `<tr>${cells}<td><button class="btn-danger" onclick="deleteData(${row.id})">Hapus</button></td></tr>`;
      }).join('');
      container.innerHTML = `
        <table>
          <thead><tr>${headerRow}<th>Aksi</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function showResponse(ok, msg) {
      const el = document.getElementById('response');
      el.className = ok ? 'success' : 'error';
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    // Load data on page load
    loadData();
  </script>
</body>
</html>
